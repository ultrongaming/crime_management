{% extends "base.html" %}
{% block title %}File New Case{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>File New Case</h1>
    <div class="desc">A case number is assigned automatically on save.</div>
  </div>
</div>

<form class="card" method="POST">
  <div class="form-grid">
    <div class="field full">
      <label for="title">Case title</label>
      <input type="text" id="title" name="title" placeholder="e.g. Break-in at Millbrook Hardware" required>
    </div>
    <div class="field">
      <label for="crime_type">Crime type</label>
      <input type="text" id="crime_type" name="crime_type" placeholder="e.g. Burglary" required>
    </div>
    <div class="field">
      <label for="location">Location</label>
      <input type="text" id="location" name="location" placeholder="Address or area">
    </div>
    <div class="field">
      <label for="date_reported">Date reported</label>
      <input type="date" id="date_reported" name="date_reported" value="{{ today }}">
    </div>
    <div class="field">
      <label for="priority">Priority</label>
      <select id="priority" name="priority">
        <option>Low</option>
        <option selected>Medium</option>
        <option>High</option>
        <option>Critical</option>
      </select>
    </div>
    <div class="field">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option selected>Open</option>
        <option>Under Investigation</option>
        <option>Closed</option>
        <option>Cold</option>
      </select>
    </div>
    <div class="field">
      <label for="officer_id">Assigned officer</label>
      <select id="officer_id" name="officer_id">
        <option value="">Unassigned</option>
        {% for o in officers %}
        <option value="{{ o.id }}">{{ o.full_name }} — {{ o.department }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="criminal_id">Linked record (optional)</label>
      <select id="criminal_id" name="criminal_id">
        <option value="">None</option>
        {% for cr in criminals %}
        <option value="{{ cr.id }}">{{ cr.full_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field full">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="What happened, and what's known so far…"></textarea>
    </div>
  </div>
  <div style="display:flex; gap:10px; margin-top:6px;">
    <button class="btn btn-primary" type="submit">File case</button>
    <a class="btn btn-ghost" href="{{ url_for('cases') }}">Cancel</a>
  </div>
</form>
{% endblock %}
